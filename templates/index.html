<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pi Search</title>

<style>

:root{
--bg:#f4f6fb;
--card:#ffffff;
--text:#111;
--accent:#5865f2;
--border:#e2e5ea;
}

body.dark{
--bg:#0f1117;
--card:#1c1f26;
--text:#e6e6e6;
--border:#2b2f36;
}

body{
margin:0;
font-family:system-ui;
background:var(--bg);
color:var(--text);
transition:background .35s,color .35s;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px 40px;
border-bottom:none;
background:var(--card);
}

.logo{
font-size:22px;
font-weight:700;
}

button{
background:var(--accent);
border:none;
color:white;
padding:10px 16px;
border-radius:8px;
cursor:pointer;
font-size:14px;
margin-top:12px;
}

button.secondary{
background:#777;
}

.container{
max-width:700px;
margin:60px auto;
padding:20px;
}

.card{
background:var(--card);
padding:30px;
border-radius:14px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
margin-bottom:25px;
transition:background .35s;
}
 
.input-group{
display:flex;
gap:10px;
margin-top:10px;
}

select{
flex:1;
padding:12px;
border-radius:8px;
border:1px solid var(--border);
font-size:15px;
background:transparent;
color:var(--text);
}

input{
flex:3;
padding:12px;
border-radius:8px;
border:1px solid var(--border);
font-size:15px;
background:transparent;
color:var(--text);
}

.result{
font-family:monospace;
white-space:pre-wrap;
margin-top:20px;
font-size:18px;
line-height:1.6;
}

.settings{
position:fixed;
right:20px;
top:70px;
background:var(--card);
padding:15px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
display:none;
z-index:10;
}

.settings label{
cursor:pointer;
}

</style>
</head>

<body>

<header>

<div class="logo">π Pi Search</div>

<div>

<a href="https://discord.com/oauth2/authorize?client_id=1425638868626964540&scope=bot%20applications.commands&permissions=274877975552">
<button>➕ 봇 추가하기</button>
</a>

<button onclick="toggleSettings()">⚙</button>

</div>

</header>

<div class="settings" id="settings">

<label>
<input type="checkbox" id="darkToggle">
 다크 모드
</label>

</div>

<div class="container">

<div class="card">

<h2>파이 검색</h2>

<div class="input-group">

<select id="mode">
<option value="search">숫자 검색</option>
<option value="digit">자리 검색</option>
</select>

<input id="input" placeholder="숫자 또는 자리 입력">

</div>

<button onclick="run()">검색</button>
<button class="secondary" onclick="randomPi()">랜덤</button>

</div>

<div class="card">

<h3>검색 결과</h3>

<div id="time"></div>

<div id="result" class="result"></div>

<button onclick="copyResult()">결과 복사</button>

<button onclick="nextResult()">다음 발견</button>

</div>

</div>

<script>

let results=[]
let resultIndex=0

function toggleSettings(){

const panel=document.getElementById("settings")

if(panel.style.display==="block"){
panel.style.display="none"
}else{
panel.style.display="block"
}

}

const darkToggle=document.getElementById("darkToggle")

darkToggle.addEventListener("change",()=>{

document.body.classList.toggle("dark")

localStorage.setItem(
"dark",
document.body.classList.contains("dark")
)

})

if(localStorage.getItem("dark")==="true"){
document.body.classList.add("dark")
darkToggle.checked=true
}

async function run(){

let start=performance.now()

let mode=document.getElementById("mode").value
let value=document.getElementById("input").value

let url=mode==="search"
?"/search?q="+value
:"/digit?position="+value

let res=await fetch(url)
let data=await res.json()

let output=""

if(mode==="search"){

if(!data.found){
output="❌ 검색 결과가 없습니다"
}else{

results = data.positions
resultIndex = 0

let ctx=data.context
let i=ctx.indexOf(value)

let highlight=
ctx.slice(0,i)+"<b>"+value+"</b>"+ctx.slice(i+value.length)

let prefix=data.start===0?"":"..."
let suffix="..."

if(data.start===0){
ctx="3."+ctx.slice(1)
highlight="3."+highlight.slice(1)
}

output=
"위치: "+data.position+"\n\n"+
prefix+highlight+suffix

}

}else{

let ctx=data.context
let digit=data.digit
let i=ctx.indexOf(digit)

let highlight=
ctx.slice(0,i)+"<b>"+digit+"</b>"+ctx.slice(i+1)

let prefix=data.start===0?"":"..."
let suffix="..."

if(data.start===0){
ctx="3."+ctx.slice(1)
highlight="3."+highlight.slice(1)
}

output=
"자리: "+data.position+"\n\n"+
prefix+highlight+suffix

}

let end=performance.now()

document.getElementById("time").innerText=
"검색 시간: "+((end-start)/1000).toFixed(3)+"초"

document.getElementById("result").innerHTML=output

}

function randomPi(){

let pos=Math.floor(Math.random()*1000000)

document.getElementById("mode").value="digit"
document.getElementById("input").value=pos

run()

}

function copyResult(){

navigator.clipboard.writeText(
document.getElementById("result").innerText
)

}

document.getElementById("input")
.addEventListener("keypress",(e)=>{
if(e.key==="Enter") run()
})

function nextResult(){

if(resultIndex+1>=results.length){
alert("마지막 결과입니다")
return
}

resultIndex++

showResult()

}

function showResult(){

let pos=results[resultIndex]
let value=document.getElementById("input").value

fetch("/context?pos="+pos)
.then(r=>r.json())
.then(data=>{

let ctx=data.context
let i=ctx.indexOf(value)

let highlight=
ctx.slice(0,i)+"<b>"+value+"</b>"+ctx.slice(i+value.length)

document.getElementById("result").innerHTML=highlight

})

}

</script>

</body>
</html>
